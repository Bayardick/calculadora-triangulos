<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Triángulos</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:white;
    width:100%;
    max-width:1000px;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.header{
    position:relative;
    height:260px;
    background:url('https://images.unsplash.com/photo-1509228468518-180dd4864904?q=80&w=1200&auto=format&fit=crop') center/cover;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    text-align:center;
}

.overlay h1{
    font-size:42px;
}

.content{
    padding:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.input-box{
    display:flex;
    flex-direction:column;
}

.input-box label{
    margin-bottom:8px;
    font-weight:bold;
    color:#1e3a8a;
}

.input-box input{
    padding:12px;
    border:2px solid #cbd5e1;
    border-radius:10px;
    font-size:16px;
}

.buttons{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

button{
    padding:14px 28px;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

.calcular{
    background:#2563eb;
    color:white;
}

.reset{
    background:#e2e8f0;
}

.resultado{
    margin-top:35px;
    background:#f8fafc;
    border-radius:15px;
    padding:25px;
    display:none;
}

.resultado h2{
    color:#1e3a8a;
    margin-bottom:20px;
}

.resultado p{
    margin:10px 0;
    font-size:18px;
}

.error{
    color:red;
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}

.image-section{
    margin-top:30px;
    display:flex;
    justify-content:center;
}

.image-section img{
    width:280px;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">

        <div class="overlay">

            <h1>Calculadora de Triángulos</h1>

            <h3 style="margin-top:10px;">
                Alumno: Luis Bayardo
            </h3>

            <p style="margin-top:10px;">
                Resuelve triángulos usando trigonometría
            </p>

        </div>

    </div>

    <div class="content">

        <div class="grid">

            <div class="input-box">
                <label>Lado a</label>
                <input type="number" id="a">
            </div>

            <div class="input-box">
                <label>Lado b</label>
                <input type="number" id="b">
            </div>

            <div class="input-box">
                <label>Lado c</label>
                <input type="number" id="c">
            </div>

            <div class="input-box">
                <label>Ángulo A</label>
                <input type="number" id="A">
            </div>

            <div class="input-box">
                <label>Ángulo B</label>
                <input type="number" id="B">
            </div>

            <div class="input-box">
                <label>Ángulo C</label>
                <input type="number" id="C">
            </div>

        </div>

        <div class="buttons">
            <button class="calcular" onclick="calcular()">
                Calcular
            </button>

            <button class="reset" onclick="limpiar()">
                Restablecer
            </button>
        </div>

        <div class="error" id="error"></div>

        <div class="resultado" id="resultado">

            <h2>Resultados</h2>

            <p id="r1"></p>
            <p id="r2"></p>
            <p id="r3"></p>
            <p id="r4"></p>
            <p id="r5"></p>
            <p id="r6"></p>
            <p id="tipo"></p>

        </div>

        <div class="image-section">

            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2d/Triangle_geometry.svg/512px-Triangle_geometry.svg.png">

        </div>

    </div>

</div>

<script>

function rad(x){
    return x * Math.PI / 180;
}

function deg(x){
    return x * 180 / Math.PI;
}

function calcular(){

    let a=parseFloat(document.getElementById('a').value);
    let b=parseFloat(document.getElementById('b').value);
    let c=parseFloat(document.getElementById('c').value);

    let A=parseFloat(document.getElementById('A').value);
    let B=parseFloat(document.getElementById('B').value);
    let C=parseFloat(document.getElementById('C').value);

    let error=document.getElementById('error');
    error.innerHTML='';

    if(!isNaN(a)&&!isNaN(b)&&!isNaN(c)){

        A=deg(Math.acos((b*b+c*c-a*a)/(2*b*c)));
        B=deg(Math.acos((a*a+c*c-b*b)/(2*a*c)));
        C=180-A-B;
    }

    else{
        error.innerHTML='Ingresa los 3 lados.';
        return;
    }

    document.getElementById('resultado').style.display='block';

    document.getElementById('r1').innerHTML='Lado a: '+a.toFixed(2);
    document.getElementById('r2').innerHTML='Lado b: '+b.toFixed(2);
    document.getElementById('r3').innerHTML='Lado c: '+c.toFixed(2);

    document.getElementById('r4').innerHTML='Ángulo A: '+A.toFixed(2)+'°';
    document.getElementById('r5').innerHTML='Ángulo B: '+B.toFixed(2)+'°';
    document.getElementById('r6').innerHTML='Ángulo C: '+C.toFixed(2)+'°';

    let tipo='';

    if(a===b && b===c){
        tipo='Equilátero';
    }

    else if(a===b || a===c || b===c){
        tipo='Isósceles';
    }

    else{
        tipo='Escaleno';
    }

    document.getElementById('tipo').innerHTML='Tipo: '+tipo;
}

function limpiar(){

    document.querySelectorAll('input').forEach(input=>{
        input.value='';
    });

    document.getElementById('resultado').style.display='none';
    document.getElementById('error').innerHTML='';
}

</script>

</body>
</html>
