<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Triángulos</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:white;
    width:100%;
    max-width:1000px;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.header{
    position:relative;
    height:260px;
    background:url('https://images.unsplash.com/photo-1509228468518-180dd4864904?q=80&w=1200&auto=format&fit=crop') center/cover;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    text-align:center;
}

.overlay h1{
    font-size:42px;
    margin-bottom:10px;
}

.overlay p{
    font-size:18px;
}

.content{
    padding:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.input-box{
    display:flex;
    flex-direction:column;
}

.input-box label{
    margin-bottom:8px;
    font-weight:bold;
    color:#1e3a8a;
}

.input-box input{
    padding:12px;
    border:2px solid #cbd5e1;
    border-radius:10px;
    font-size:16px;
}

.input-box input:focus{
    outline:none;
    border-color:#2563eb;
}

.buttons{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

button{
    padding:14px 28px;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.calcular{
    background:#2563eb;
    color:white;
}

.calcular:hover{
    background:#1d4ed8;
    transform:scale(1.05);
}

.reset{
    background:#e2e8f0;
}

.reset:hover{
    background:#94a3b8;
    color:white;
}

.resultado{
    margin-top:35px;
    background:#f8fafc;
    border-radius:15px;
    padding:25px;
    display:none;
}

.resultado h2{
    color:#1e3a8a;
    margin-bottom:20px;
}

.resultado p{
    margin:10px 0;
    font-size:18px;
}

.error{
    color:red;
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}

.image-section{
    margin-top:30px;
    display:flex;
    justify-content:center;
}

.image-section img{
    width:280px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.footer{
    margin-top:30px;
    text-align:center;
    color:#64748b;
}

</style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="overlay">
            <h1>Calculadora de Triángulos</h1>
            <h3 style="margin-top:10px;">Alumno: Luis Bayardo</h3>
            <p style="margin-top:10px;">Resuelve triángulos usando trigonometría</p>
        </div>
    </div>

    <div class="content">

        <div class="grid">

            <div class="input-box">
                <label>Lado a</label>
                <input type="number" id="a" placeholder="Ejemplo: 5">
            </div>

            <div class="input-box">
                <label>Lado b</label>
                <input type="number" id="b" placeholder="Ejemplo: 8">
            </div>

            <div class="input-box">
                <label>Lado c</label>
                <input type="number" id="c" placeholder="Ejemplo: 10">
            </div>

            <div class="input-box">
                <label>Ángulo A</label>
                <input type="number" id="A" placeholder="Ejemplo: 45">
            </div>

            <div class="input-box">
                <label>Ángulo B</label>
                <input type="number" id="B" placeholder="Ejemplo: 60">
            </div>

            <div class="input-box">
                <label>Ángulo C</label>
                <input type="number" id="C" placeholder="Ejemplo: 75">
            </div>

        </div>

        <div class="buttons">
            <button class="calcular" onclick="calcular()">Calcular</button>
            <button class="reset" onclick="limpiar()">Restablecer</button>
        </div>

        <div class="error" id="error"></div>

        <div class="resultado" id="resultado">
            <h2>Resultados</h2>

            <p id="r1"></p>
            <p id="r2"></p>
            <p id="r3"></p>
            <p id="r4"></p>
            <p id="r5"></p>
            <p id="r6"></p>
            <p id="tipo"></p>
        </div>

        <div class="image-section">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2d/Triangle_geometry.svg/512px-Triangle_geometry.svg.png" alt="Triángulo">
        </div>

        <div class="footer">
            <p>Proyecto de trigonometría y cálculo de triángulos</p>
        </div>

    </div>

</div>

<script>

function rad(x){
    return x * Math.PI / 180;
}

function deg(x){
    return x * 180 / Math.PI;
}

function calcular(){

    let a=parseFloat(document.getElementById('a').value);
    let b=parseFloat(document.getElementById('b').value);
    let c=parseFloat(document.getElementById('c').value);

    let A=parseFloat(document.getElementById('A').value);
    let B=parseFloat(document.getElementById('B').value);
    let C=parseFloat(document.getElementById('C').value);

    let error=document.getElementById('error');
    error.innerHTML='';

    let datos=[a,b,c,A,B,C].filter(x=>!isNaN(x)).length;

    if(datos<3){
        error.innerHTML='Debes ingresar al menos 3 datos.';
        return;
    }

    let lados=[a,b,c].filter(x=>!isNaN(x)).length;

    if(lados<1){
        error.innerHTML='Debes ingresar al menos un lado.';
        return;
    }

    try{

        if(!isNaN(a)&&!isNaN(b)&&!isNaN(c)){

            if(a+b<=c||a+c<=b||b+c<=a){
                throw 'Los lados no forman un triángulo válido';
            }

            A=deg(Math.acos((b*b+c*c-a*a)/(2*b*c)));
            B=deg(Math.acos((a*a+c*c-b*b)/(2*a*c)));
            C=180-A-B;
        }

        else if(!isNaN(a)&&!isNaN(b)&&!isNaN(C)){

            c=Math.sqrt(a*a+b*b-2*a*b*Math.cos(rad(C)));

            A=deg(Math.asin((a*Math.sin(rad(C)))/c));
            B=180-A-C;
        }

        else if(!isNaN(a)&&!isNaN(A)&&!isNaN(B)){

            C=180-A-B;

            b=(a*Math.sin(rad(B)))/Math.sin(rad(A));
            c=(a*Math.sin(rad(C)))/Math.sin(rad(A));
        }

        else{
            throw 'Combinación de datos no soportada';
        }

        mostrar(a,b,c,A,B,C);

    }catch(e){
        error.innerHTML=e;
    }
}

function mostrar(a,b,c,A,B,C){

    document.getElementById('resultado').style.display='block';

    document.getElementById('r1').innerHTML='<strong>Lado a:</strong> '+a.toFixed(2);
    document.getElementById('r2').innerHTML='<strong>Lado b:</strong> '+b.toFixed(2);
    document.getElementById('r3').innerHTML='<strong>Lado c:</strong> '+c.toFixed(2);

    document.getElementById('r4').innerHTML='<strong>Ángulo A:</strong> '+A.toFixed(2)+'°';
    document.getElementById('r5').innerHTML='<strong>Ángulo B:</strong> '+B.toFixed(2)+'°';
    document.getElementById('r6').innerHTML='<strong>Ángulo C:</strong> '+C.toFixed(2)+'°';

    let tipo='';

    if(Math.abs(a-b)<0.01 && Math.abs(b-c)<0.01){
        tipo='Equilátero';
    }
    else if(Math.abs(a-b)<0.01 || Math.abs(a-c)<0.01 || Math.abs(b-c)<0.01){
        tipo='Isósceles';
    }
    else{
        tipo='Escaleno';
    }

    document.getElementById('tipo').innerHTML='<strong>Tipo:</strong> '+tipo;
}

function limpiar(){

    document.querySelectorAll('input').forEach(input=>{
        input.value='';
    });

    document.getElementById('resultado').style.display='none';
    document.getElementById('error').innerHTML='';
}

</script>

</body>
</html>
