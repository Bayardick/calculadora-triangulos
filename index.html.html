<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Calculadora de Triángulos</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background: linear-gradient(135deg,#1e3c72,#2a5298);
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .container{
        background:white;
        width:100%;
        max-width:850px;
        padding:30px;
        border-radius:20px;
        box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    h1{
        text-align:center;
        margin-bottom:25px;
        color:#1e3c72;
    }

    .grid{
        display:grid;
        grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
        gap:15px;
    }

    .input-group{
        display:flex;
        flex-direction:column;
    }

    label{
        margin-bottom:5px;
        font-weight:bold;
        color:#333;
    }

    input{
        padding:12px;
        border:2px solid #ccc;
        border-radius:10px;
        font-size:16px;
    }

    input:focus{
        outline:none;
        border-color:#2a5298;
    }

    .buttons{
        margin-top:25px;
        display:flex;
        gap:15px;
        justify-content:center;
        flex-wrap:wrap;
    }

    button{
        padding:12px 25px;
        border:none;
        border-radius:10px;
        cursor:pointer;
        font-size:16px;
        font-weight:bold;
        transition:0.3s;
    }

    .btn-calcular{
        background:#1e3c72;
        color:white;
    }

    .btn-calcular:hover{
        background:#16305c;
    }

    .btn-reset{
        background:#ccc;
    }

    .btn-reset:hover{
        background:#999;
        color:white;
    }

    .resultado{
        margin-top:30px;
        background:#f4f6fa;
        padding:20px;
        border-radius:15px;
        display:none;
    }

    .resultado h2{
        color:#1e3c72;
        margin-bottom:15px;
    }

    .resultado p{
        margin:8px 0;
        font-size:18px;
    }

    .error{
        margin-top:20px;
        color:red;
        font-weight:bold;
        text-align:center;
    }

    .formula{
        margin-top:20px;
        background:#eef3ff;
        padding:15px;
        border-radius:10px;
        font-size:14px;
    }
</style>
</head>
<body>

<div class="container">

    <h1>Calculadora de Triángulos</h1>

    <div class="grid">

        <div class="input-group">
            <label>Lado a</label>
            <input type="number" id="a" placeholder="Ejemplo: 5">
        </div>

        <div class="input-group">
            <label>Lado b</label>
            <input type="number" id="b" placeholder="Ejemplo: 7">
        </div>

        <div class="input-group">
            <label>Lado c</label>
            <input type="number" id="c" placeholder="Ejemplo: 8">
        </div>

        <div class="input-group">
            <label>Ángulo A (°)</label>
            <input type="number" id="A" placeholder="Ejemplo: 45">
        </div>

        <div class="input-group">
            <label>Ángulo B (°)</label>
            <input type="number" id="B" placeholder="Ejemplo: 60">
        </div>

        <div class="input-group">
            <label>Ángulo C (°)</label>
            <input type="number" id="C" placeholder="Ejemplo: 75">
        </div>

    </div>

    <div class="buttons">
        <button class="btn-calcular" onclick="calcularTriangulo()">
            Calcular
        </button>

        <button class="btn-reset" onclick="resetear()">
            Restablecer
        </button>
    </div>

    <div class="error" id="error"></div>

    <div class="resultado" id="resultado">
        <h2>Resultados</h2>

        <p id="resA"></p>
        <p id="resB"></p>
        <p id="resC"></p>

        <p id="resa"></p>
        <p id="resb"></p>
        <p id="resc"></p>

        <p id="tipo"></p>

        <div class="formula">
            Se utilizaron:
            <ul>
                <li>Ley del Seno</li>
                <li>Ley del Coseno</li>
                <li>Suma de ángulos internos</li>
            </ul>
        </div>
    </div>

</div>

<script>

function toRad(grados){
    return grados * Math.PI / 180;
}

function toDeg(rad){
    return rad * 180 / Math.PI;
}

function calcularTriangulo(){

    let a = parseFloat(document.getElementById("a").value);
    let b = parseFloat(document.getElementById("b").value);
    let c = parseFloat(document.getElementById("c").value);

    let A = parseFloat(document.getElementById("A").value);
    let B = parseFloat(document.getElementById("B").value);
    let C = parseFloat(document.getElementById("C").value);

    let error = document.getElementById("error");
    error.innerHTML = "";

    let datos = [a,b,c,A,B,C].filter(x => !isNaN(x)).length;

    if(datos < 3){
        error.innerHTML = "Debes ingresar al menos 3 datos.";
        return;
    }

    let lados = [a,b,c].filter(x => !isNaN(x)).length;

    if(lados < 1){
        error.innerHTML = "Debes ingresar al menos un lado.";
        return;
    }

    try{

        // CASO 1: 3 lados
        if(!isNaN(a) && !isNaN(b) && !isNaN(c)){

            if(a+b<=c || a+c<=b || b+c<=a){
                throw "Los lados no forman un triángulo válido.";
            }

            A = toDeg(Math.acos((b*b + c*c - a*a)/(2*b*c)));
            B = toDeg(Math.acos((a*a + c*c - b*b)/(2*a*c)));
            C = 180 - A - B;
        }

        // CASO 2: 2 ángulos y 1 lado
        else if(!isNaN(A) && !isNaN(B) && !isNaN(a)){

            C = 180 - A - B;

            if(C <= 0){
                throw "La suma de ángulos debe ser menor a 180°.";
            }

            b = (a * Math.sin(toRad(B))) / Math.sin(toRad(A));
            c = (a * Math.sin(toRad(C))) / Math.sin(toRad(A));
        }

        // CASO 3: 2 lados y ángulo incluido
        else if(!isNaN(a) && !isNaN(b) && !isNaN(C)){

            c = Math.sqrt(
                a*a + b*b - 2*a*b*Math.cos(toRad(C))
            );

            A = toDeg(Math.asin((a*Math.sin(toRad(C)))/c));
            B = 180 - A - C;
        }

        else{
            throw "Combinación de datos no soportada en esta versión.";
        }

        mostrarResultados(a,b,c,A,B,C);

    }catch(err){
        error.innerHTML = err;
        document.getElementById("resultado").style.display = "none";
    }
}

function mostrarResultados(a,b,c,A,B,C){

    document.getElementById("resultado").style.display = "block";

    document.getElementById("resA").innerHTML =
        "<strong>Ángulo A:</strong> " + A.toFixed(2) + "°";

    document.getElementById("resB").innerHTML =
        "<strong>Ángulo B:</strong> " + B.toFixed(2) + "°";

    document.getElementById("resC").innerHTML =
        "<strong>Ángulo C:</strong> " + C.toFixed(2) + "°";

    document.getElementById("resa").innerHTML =
        "<strong>Lado a:</strong> " + a.toFixed(2);

    document.getElementById("resb").innerHTML =
        "<strong>Lado b:</strong> " + b.toFixed(2);

    document.getElementById("resc").innerHTML =
        "<strong>Lado c:</strong> " + c.toFixed(2);

    let tipo = "";

    if(
        Math.abs(a-b)<0.01 &&
        Math.abs(b-c)<0.01
    ){
        tipo = "Equilátero";
    }
    else if(
        Math.abs(a-b)<0.01 ||
        Math.abs(a-c)<0.01 ||
        Math.abs(b-c)<0.01
    ){
        tipo = "Isósceles";
    }
    else{
        tipo = "Escaleno";
    }

    document.getElementById("tipo").innerHTML =
        "<strong>Tipo de triángulo:</strong> " + tipo;
}

function resetear(){

    document.querySelectorAll("input").forEach(input=>{
        input.value = "";
    });

    document.getElementById("resultado").style.display = "none";
    document.getElementById("error").innerHTML = "";
}

</script>

</body>
</html>
